<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Who's In? 🏢</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #F5F0E8;
            --surface: #FFFDF7;
            --surface2: #EDE8DC;
            --ink: #1C1A15;
            --ink-muted: #6B6455;
            --accent: #D4621A;
            --accent-light: #F2E4D8;
            --green: #2E7D4F;
            --green-light: #D6EDE1;
            --border: #DDD8CC;
            --shadow: 0 2px 12px rgba(28, 26, 21, 0.08);
            --radius: 14px;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            line-height: 1.5;
        }

        /* ── Background texture ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4bc9e' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ── LOGIN ── */
        #login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 40px rgba(28, 26, 21, 0.12);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.2rem;
            line-height: 1.1;
            margin-bottom: 6px;
            color: var(--ink);
        }

        .login-card p.subtitle {
            color: var(--ink-muted);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 6px;
        }

        select,
        input[type="text"],
        input[type="password"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 18px;
            appearance: none;
        }

        select:focus,
        input:focus,
        textarea:focus {
            border-color: var(--accent);
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 11px 22px;
            border-radius: 10px;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: #b8541a;
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--ink-muted);
            border: 1.5px solid var(--border);
            font-size: 0.85rem;
            padding: 8px 14px;
        }

        .btn-ghost:hover {
            background: var(--surface2);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        .btn-join {
            background: var(--green-light);
            color: var(--green);
            border: 1.5px solid #b2d9c4;
        }

        .btn-join:hover {
            background: #c3e8d4;
        }

        .btn-remove {
            background: #fde8e0;
            color: #c0391b;
            border: 1.5px solid #f5c4b8;
        }

        .btn-remove:hover {
            background: #fcd3c9;
        }

        .error-msg {
            color: #c0391b;
            font-size: 0.85rem;
            margin-top: -10px;
            margin-bottom: 14px;
        }

        /* ── APP ── */
        #app {
            display: none;
            position: relative;
            z-index: 1;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: var(--shadow);
        }

        header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: white;
            flex-shrink: 0;
        }

        main {
            max-width: 860px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        /* ── ADD VISIT CARD ── */
        .add-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            margin-bottom: 32px;
            box-shadow: var(--shadow);
            animation: slideUp 0.35s ease;
        }

        .add-card h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem;
            margin-bottom: 18px;
            color: var(--ink);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        @media (max-width: 560px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            header {
                padding: 12px 16px;
            }

            main {
                padding: 20px 12px 60px;
            }

            .login-card {
                padding: 32px 24px;
            }
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        .btn-submit {
            background: var(--accent);
            color: white;
            flex: 1;
        }

        .btn-submit:hover {
            background: #b8541a;
        }

        /* ── CALENDAR ── */
        .section-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--ink);
        }

        .week-group {
            margin-bottom: 28px;
        }

        .week-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-muted);
            margin-bottom: 10px;
            padding-left: 4px;
        }

        .day-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 10px;
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .day-card:hover {
            box-shadow: var(--shadow);
        }

        .day-card.has-visits {
            border-color: #c8d9cc;
        }

        .day-header {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: default;
        }

        .day-label {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .day-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .day-date {
            color: var(--ink-muted);
            font-size: 0.85rem;
        }

        .day-today .day-name {
            color: var(--accent);
        }

        .day-count {
            font-size: 0.8rem;
            color: var(--ink-muted);
            background: var(--surface2);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .day-count.has-people {
            background: var(--green-light);
            color: var(--green);
        }

        .visit-list {
            padding: 0 20px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .visit-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 14px;
            background: var(--bg);
            border-radius: 10px;
            border: 1px solid var(--border);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .visit-person {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .visit-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .visit-note {
            color: var(--ink-muted);
            font-size: 0.82rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .visit-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* add-yourself row */
        .day-add-row {
            padding: 0 20px 16px;
        }

        .btn-be-there {
            background: var(--accent-light);
            color: var(--accent);
            border: 1.5px dashed #d4a88a;
            font-size: 0.82rem;
            padding: 7px 14px;
            border-radius: 9px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s;
        }

        .btn-be-there:hover {
            background: #f0d8c8;
            border-style: solid;
        }

        .empty-week {
            color: var(--ink-muted);
            font-size: 0.9rem;
            padding: 14px 0 4px;
            font-style: italic;
        }

        /* quick note inline */
        .inline-note-form {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .inline-note-form input {
            margin-bottom: 0;
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--ink);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .skeleton {
            background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 10px;
            height: 60px;
            margin-bottom: 10px;
        }

        @keyframes shimmer {
            from {
                background-position: 200% 0;
            }

            to {
                background-position: -200% 0;
            }
        }
    </style>
</head>

<body>

    <!-- ══ LOGIN ══════════════════════════════════════════════ -->
    <div id="login-screen">
        <div class="login-card">
            <h1>Who's In? 🏢</h1>
            <p class="subtitle">Sign in to see who's heading to the office.</p>

            <label for="login-name">Your name</label>
            <select id="login-name"></select>

            <label for="login-pin">Your PIN</label>
            <input type="password" id="login-pin" placeholder="4-digit PIN" maxlength="6" />

            <p id="login-error" class="error-msg" style="display:none"></p>

            <button class="btn btn-primary" onclick="doLogin()">Sign in →</button>
        </div>
    </div>

    <!-- ══ APP ════════════════════════════════════════════════ -->
    <div id="app">
        <header>
            <h1>🏢 Who's In?</h1>
            <div class="user-badge">
                <div class="avatar" id="header-avatar"></div>
                <span id="header-name" style="font-weight:600"></span>
                <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign out</button>
            </div>
        </header>

        <main>
            <!-- Add Visit -->
            <div class="add-card">
                <h2>📅 I'm heading in</h2>
                <div class="form-row" style="grid-template-columns: 1fr 1fr 1fr 1fr;">
                    <div>
                        <label for="visit-date">Date</label>
                        <input type="date" id="visit-date" />
                    </div>
                    <div>
                        <label for="visit-from">From</label>
                        <select id="visit-from">
                            <option value="">Any time</option>
                        </select>
                    </div>
                    <div>
                        <label for="visit-to">To</label>
                        <select id="visit-to">
                            <option value="">Any time</option>
                        </select>
                    </div>
                    <div>
                        <label for="visit-note">Note <span
                                style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
                        <input type="text" id="visit-note" placeholder="e.g. Workshop, Client visit…" />
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn btn-submit" onclick="addVisit()">Add my visit</button>
                </div>
            </div>

            <!-- Calendar -->
            <div class="section-title">Next 3 weeks</div>
            <div id="calendar">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;
        let currentUserId = null;
        let visits = [];
        let allMembers = [];

        const COLORS = [
            '#C0392B', '#1A6B4A', '#1565C0', '#6A0DAD', '#C56A00',
            '#00757F', '#8B3A3A', '#2D6A00', '#7B4F00', '#004D6E'
        ];

        function populateTimeDropdowns() {
            const selects = ['visit-from', 'visit-to'];
            const times = [];
            for (let h = 7; h <= 21; h++) {
                ['00', '30'].forEach(m => {
                    const hour = h % 12 === 0 ? 12 : h % 12;
                    const ampm = h < 12 ? 'AM' : 'PM';
                    const display = `${hour}:${m} ${ampm}`;
                    const value = `${String(h).padStart(2, '0')}:${m}`;
                    times.push({ display, value });
                });
            }
            selects.forEach(id => {
                const sel = document.getElementById(id);
                times.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t.value;
                    opt.textContent = t.display;
                    sel.appendChild(opt);
                });
            });
        }

        function colorForName(name) {
            let h = 0;
            for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xFFFF;
            return COLORS[h % COLORS.length];
        }

        function initials(name) {
            return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
        }

        function avatarHtml(name, size = 30) {
            const color = colorForName(name);
            return `<div class="avatar" style="background:${color};width:${size}px;height:${size}px">${initials(name)}</div>`;
        }

        // ── Date helpers ────────────────────────────────────────
        function todayStr() {
            return new Date().toISOString().split('T')[0];
        }

        function next21Days() {
            const days = [];
            const d = new Date();
            for (let i = 0; i <= 21; i++) {
                const s = new Date(d);
                s.setDate(d.getDate() + i);
                days.push(s.toISOString().split('T')[0]);
            }
            return days;
        }

        function formatDate(str) {
            const d = new Date(str + 'T12:00:00');
            return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' });
        }

        function weekLabel(str) {
            const d = new Date(str + 'T12:00:00');
            const weekStart = new Date(d);
            weekStart.setDate(d.getDate() - d.getDay() + 1);
            return 'Week of ' + weekStart.toLocaleDateString('en-GB', { day: 'numeric', month: 'long' });
        }

        function dayName(str) {
            return new Date(str + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'long' });
        }

        function shortDate(str) {
            return new Date(str + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        }

        // ── API helpers ─────────────────────────────────────────
        async function api(method, path, body) {
            const res = await fetch(path, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: body ? JSON.stringify(body) : undefined
            });
            return res.json();
        }

        // ── Auth ────────────────────────────────────────────────
        async function loadMembers() {
            const members = await api('GET', '/api/members');
            allMembers = members;
            const sel = document.getElementById('login-name');
            sel.innerHTML = '<option value="">— Select your name —</option>' +
                members.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
        }

        async function doLogin() {
            const name = document.getElementById('login-name').value;
            const pin = document.getElementById('login-pin').value;
            const err = document.getElementById('login-error');
            err.style.display = 'none';
            if (!name) { err.textContent = 'Please select your name.'; err.style.display = 'block'; return; }
            if (!pin) { err.textContent = 'Please enter your PIN.'; err.style.display = 'block'; return; }
            const data = await api('POST', '/api/login', { name, pin });
            if (data.error) { err.textContent = data.error; err.style.display = 'block'; return; }
            currentUser = data.user;
            currentUserId = data.id;
            showApp();
        }

        async function doLogout() {
            await api('POST', '/api/logout');
            location.reload();
        }

        async function checkSession() {
            const data = await api('GET', '/api/me');
            if (data.user) {
                currentUser = data.user;
                currentUserId = data.id;
                showApp();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
            }
        }

        // ── App UI ───────────────────────────────────────────────
        function showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('header-name').textContent = currentUser;
            const av = document.getElementById('header-avatar');
            av.textContent = initials(currentUser);
            av.style.background = colorForName(currentUser);
            // Set default date to today
            document.getElementById('visit-date').value = todayStr();
            document.getElementById('visit-date').min = todayStr();
            populateTimeDropdowns();
            loadVisits();
        }

        async function loadVisits() {
            visits = await api('GET', '/api/visits');
            renderCalendar();
        }

        function renderCalendar() {
            const days = next21Days();
            const byDate = {};
            days.forEach(d => byDate[d] = []);
            visits.forEach(v => {
                if (byDate[v.visit_date] !== undefined) byDate[v.visit_date].push(v);
            });

            // Group into weeks
            const weeks = {};
            days.forEach(d => {
                const wl = weekLabel(d);
                if (!weeks[wl]) weeks[wl] = [];
                weeks[wl].push(d);
            });

            const today = todayStr();
            let html = '';

            for (const [wLabel, wDays] of Object.entries(weeks)) {
                html += `<div class="week-group"><div class="week-label">${wLabel}</div>`;
                wDays.forEach(d => {
                    const dayVisits = byDate[d];
                    const isToday = d === today;
                    const iAmHere = dayVisits.some(v => v.member_id === currentUserId);
                    const count = dayVisits.length;
                    html += `
          <div class="day-card ${count > 0 ? 'has-visits' : ''} ${isToday ? 'day-today' : ''}">
            <div class="day-header">
              <div class="day-label">
                <span class="day-name">${isToday ? 'Today' : dayName(d)}</span>
                <span class="day-date">${shortDate(d)}</span>
              </div>
              <span class="day-count ${count > 0 ? 'has-people' : ''}">
                ${count === 0 ? 'No one yet' : count === 1 ? '1 person' : count + ' people'}
              </span>
            </div>`;

                    if (dayVisits.length > 0) {
                        html += `<div class="visit-list">`;
                        dayVisits.forEach(v => {
                            const isMe = v.member_id === currentUserId;
                            html += `
              <div class="visit-item" id="visit-${v.id}">
                <div class="visit-person">
                  ${avatarHtml(v.member_name, 28)}
                  <div>
                    <div class="visit-name">${v.member_name}${isMe ? ' <span style="color:var(--accent);font-size:0.75rem">(you)</span>' : ''}</div>
                        ${(v.time_from || v.time_to) ? `<div class="visit-note">🕐 ${v.time_from ? v.time_from.slice(0, 5) : '?'} – ${v.time_to ? v.time_to.slice(0, 5) : '?'}</div>` : ''}
                        ${v.note ? `<div class="visit-note">💬 ${v.note}</div>` : ''}
                  </div>
                </div>
                <div class="visit-actions">
                  ${isMe ? `<button class="btn btn-sm btn-remove" onclick="removeVisit(${v.id})">Remove</button>` : ''}
                </div>
              </div>`;
                        });
                        html += `</div>`;
                    }

                    // "I'll be there" button if not already added
                    if (!iAmHere) {
                        html += `
            <div class="day-add-row">
              <button class="btn-be-there" onclick="quickJoin('${d}', this)">+ I'll be there</button>
            </div>`;
                    }

                    html += `</div>`; // day-card
                });
                html += `</div>`; // week-group
            }

            document.getElementById('calendar').innerHTML = html;
        }

        // ── Actions ──────────────────────────────────────────────
        async function addVisit() {
            const date = document.getElementById('visit-date').value;
            const note = document.getElementById('visit-note').value.trim();
            const time_from = document.getElementById('visit-from').value;
            const time_to = document.getElementById('visit-to').value;
            if (!date) { showToast('Please pick a date'); return; }
            const res = await api('POST', '/api/visits', { visit_date: date, note, time_from, time_to });
            if (res.error) { showToast(res.error); return; }
            document.getElementById('visit-note').value = '';
            document.getElementById('visit-from').value = '';
            document.getElementById('visit-to').value = '';
            showToast('Visit added! 🎉');
            await loadVisits();
        }

        async function quickJoin(date, btn) {
            btn.disabled = true;
            btn.textContent = 'Adding…';
            const res = await api('POST', '/api/visits', { visit_date: date, note: '' });
            if (res.error) { showToast(res.error); btn.disabled = false; btn.textContent = "+ I'll be there"; return; }
            showToast('You are in! 👋');
            await loadVisits();
        }

        async function removeVisit(id) {
            const res = await api('DELETE', `/api/visits/${id}`);
            if (res.error) { showToast(res.error); return; }
            showToast('Removed');
            await loadVisits();
        }

        // ── Toast ────────────────────────────────────────────────
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
        }

        // ── Enter key for login ──────────────────────────────────
        document.getElementById('login-pin').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });

        // ── Boot ─────────────────────────────────────────────────
        loadMembers();
        checkSession();
    </script>
